version: "3.8"

# Boost.space TOFU — Grafana Visualization Stack
# Usage: docker compose up -d
# Dashboard: http://localhost:3000  (admin / boostspace)

services:

  grafana:
    image: grafana/grafana-oss:latest
    container_name: boostspace_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: boostspace
      GF_INSTALL_PLUGINS:         yesoreyeram-infinity-datasource
      GF_SERVER_ROOT_URL:         http://localhost:3000
      GF_FEATURE_TOGGLES_ENABLE:  publicDashboards
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - tofu_net

  # Optional: lightweight JSON proxy if you want Grafana to hit PostHog directly
  # (avoids CORS and keeps API key out of Grafana config UI)
  posthog-proxy:
    image: node:20-alpine
    container_name: boostspace_ph_proxy
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./proxy:/app
    command: node server.js
    ports:
      - "4000:4000"
    environment:
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_PROJECT: "100634"
      POSTHOG_BASE_URL: "https://eu.posthog.com"
    networks:
      - tofu_net

volumes:
  grafana_data:

networks:
  tofu_net:
    driver: bridge
